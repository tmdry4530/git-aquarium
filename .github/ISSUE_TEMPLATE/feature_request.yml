name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered?
    validations:
      required: false

  - type: dropdown
    id: phase
    attributes:
      label: Suggested Phase
      options:
        - Phase 1 (MVP)
        - Phase 2 (Social)
        - Phase 3 (Customization)
        - Phase 4+
        - No preference
    validations:
      required: false
